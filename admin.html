<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard - ChatFish</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#eef2ff;
}

header{
  background:linear-gradient(90deg,#1e3a8a,#2563eb);
  color:white;
  text-align:center;
  padding:20px;
  font-size:1.8em;
}

.admin-container{
  max-width:1000px;
  margin:30px auto;
  padding:25px;
  background:white;
  border-radius:12px;
}

.stats{
  display:flex;
  gap:20px;
  margin-bottom:20px;
}

.stat-box{
  background:#2563eb;
  color:white;
  padding:15px;
  border-radius:8px;
  flex:1;
  text-align:center;
}

.add-product input{
  padding:10px;
  margin:5px;
}

.add-product button{
  padding:10px 15px;
  background:#2563eb;
  color:white;
  border:none;
  border-radius:6px;
}

.item-card{
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:#f3f3f3;
  padding:10px;
  margin-top:10px;
  border-radius:10px;
}

.item-info{
  display:flex;
  align-items:center;
}

.item-info img{
  width:60px;
  height:60px;
  object-fit:cover;
  border-radius:8px;
  margin-right:10px;
}

.delete{
  background:red;
  color:white;
  border:none;
  padding:8px 12px;
  border-radius:6px;
}

.notification-card{
  background:#fff8dc;
  padding:10px;
  margin-top:10px;
  border-left:4px solid orange;
}
</style>
</head>

<body>

<header>ChatFish Admin Dashboard</header>

<div class="admin-container">

<div class="stats">
<div class="stat-box">Total Products: <span id="productCount">0</span></div>
<div class="stat-box">Total Orders: <span id="orderCount">0</span></div>
</div>

<button onclick="window.location.href='orders.html'">View Orders</button>

<h3>Add Product</h3>

<div class="add-product">
<input id="name" placeholder="Product Name">
<input id="price" type="number" placeholder="Price">
<input type="file" id="imageFile">
<button onclick="addProduct()">Add Product</button>
</div>

<h3>Product List</h3>
<div id="productList"></div>

<h3>Cancel Requests</h3>
<div id="notifications"></div>

</div>

<script>

if(localStorage.getItem("admin")!="true"){
window.location="admin-login.html";
}

const supabaseUrl="https://twfagsktrldkvqlbxern.supabase.co";
const supabaseKey="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR3ZmFnc2t0cmxka3ZxbGJ4ZXJuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0OTc3MTksImV4cCI6MjA4OTA3MzcxOX0.kYav5Cs53PqZO77-mzxxZjkbKMXxudJ97STaRB-BY3Y";

const supabaseClient=supabase.createClient(supabaseUrl,supabaseKey);

let products=JSON.parse(localStorage.getItem("products"))||[];
let orders=[];

function loadAnalytics(){
document.getElementById("productCount").innerText=products.length;
document.getElementById("orderCount").innerText=orders.length;
}

function addProduct(){

let name=document.getElementById("name").value;
let price=document.getElementById("price").value;
let file=document.getElementById("imageFile").files[0];

if(!name||!price||!file){
alert("Fill all fields");
return;
}

let reader=new FileReader();

reader.onload=function(e){

let image=e.target.result;

products.push({name,price,image});

localStorage.setItem("products",JSON.stringify(products));

loadProducts();
loadAnalytics();

document.getElementById("name").value="";
document.getElementById("price").value="";
document.getElementById("imageFile").value="";

}

reader.readAsDataURL(file);

}

function loadProducts(){

let container=document.getElementById("productList");

container.innerHTML="";

products.forEach((p,i)=>{

container.innerHTML+=`
<div class="item-card">
<div class="item-info">
<img src="${p.image}">
${p.name} - ₹${p.price}
</div>
<button class="delete" onclick="deleteProduct(${i})">Delete</button>
</div>
`;

});

}

function deleteProduct(i){

products.splice(i,1);

localStorage.setItem("products",JSON.stringify(products));

loadProducts();
loadAnalytics();

}

async function loadOrders(){

const {data,error}=await supabaseClient
.from("orders")
.select("*");

if(error){
console.error(error);
return;
}

orders=data;

loadAnalytics();

loadNotifications();

}

function loadNotifications(){

let container=document.getElementById("notifications");

container.innerHTML="";

let cancelOrders=orders.filter(o=>o.cancelRequest===true);

if(cancelOrders.length===0){
container.innerHTML="<p>No cancel requests</p>";
return;
}

cancelOrders.forEach(o=>{

container.innerHTML+=`
<div class="notification-card">
<b>Order ID:</b> ${o.id}<br>
<b>Reason:</b> ${o.cancelReason}
</div>
`;

});

}

loadProducts();
loadOrders();

</script>

</body>
</html>
